<section id="contact">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 col-lg-offset-2 text-center">
                <h2 class="section-heading">Let's Get In Touch!</h2>
                <hr class="primary">

                <p>Start a project with Dr Kim Data to discuss training, consulting, or data science support.</p>

                <a href="https://forms.gle/XBGMc4pfse5QB49S7" class="btn btn-primary btn-xl" style="margin-top:15px;">
                    Start a Project
                </a>
            </div>
        </div>
        <br><br>
        <div class="container">
            <div class="col-lg-2 col-lg-offset-2 text-center">
                <a href="https://www.linkedin.com/in/{{ site.linkedin_username }}">
                    <i class="fa fa-linkedin-square fa-3x wow bounceIn" ></i>
                    <p>{{ site.linkedin_username }}</p>
                </a>
            </div>
            <div class="col-lg-2 col-lg-offset-1 text-center">
                <a href="mailto:{{ site.email }}">
                <i class="fa fa-envelope-o fa-3x wow bounceIn" data-wow-delay=".1s"></i>
                    <p>{{ site.email }}</p>
                </a>
            </div>
            <div class="col-lg-2 col-lg-offset-1 text-center">
                <a href="https://www.youtube.com/@{{ site.youtube_username }}">
                    <i class="fa fa-youtube-play fa-3x wow bounceIn" data-wow-delay=".2s"></i>
                    <p>{{ site.youtube_username }}</p>
                </a>
            </div>
                <!-- 
            <div class="col-lg-2 col-lg-offset-1 text-center">
                <a href="https://github.com/{{ site.github_username }}">
                <i class="fa fa-github fa-3x wow bounceIn" data-wow-delay=".1s"></i>
                    <p>{{ site.github_username }}</p>
                </a>
            </div>
            -->
        </div>
    </div>
</section>
